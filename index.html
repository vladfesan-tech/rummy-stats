<!DOCTYPE html>
<html lang="ro">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scor Rummy - de VAF</title>
    <style>
        :root {
            --primary: #2c3e50; --success: #27ae60; --bg: #ecf0f1;
            --white: #ffffff; --border: #bdc3c7; --atu: #f1c40f; --danger: #e74c3c;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg); color: var(--primary); margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            background-color: var(--white); padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 600px; box-sizing: border-box;
        }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        
        /* Sticky Header */
        thead tr:first-child th {
            position: sticky; top: -10px; z-index: 10; background-color: var(--primary);
        }
        .total-row td {
            position: sticky; top: 48px; z-index: 9; background-color: #e8f4f8 !important; border-bottom: 2px solid var(--border);
        }

        th, td { border: 1px solid var(--border); padding: 8px 4px; text-align: center; min-width: 65px; }
        th { background-color: var(--primary); color: var(--white); }
        .player-name { background: transparent; border: none; color: var(--white); font-weight: bold; font-size: 16px; text-align: center; width: 100%; }
        .player-name::placeholder { color: rgba(255, 255, 255, 0.6); }
        .dealer-badge { display: block; font-size: 12px; color: var(--atu); height: 14px; margin-top: 2px; }
        
        /* Buton Minus si Inputuri */
        .input-group { display: flex; gap: 4px; margin-top: 5px; }
        .btn-minus { 
            background-color: #95a5a6; color: white; border: none; border-radius: 4px; 
            font-weight: bold; font-size: 16px; padding: 0 8px; cursor: pointer;
        }
        .btn-minus:active { background-color: #7f8c8d; }
        .score-input { 
            width: 100%; padding: 8px 4px; border: 1px solid var(--border); 
            border-radius: 4px; text-align: center; font-size: 16px; min-width: 0;
        }

        .edit-input { width: 100%; border: 1px dashed transparent; text-align: center; font-size: 16px; background: transparent; }
        .total-row { font-weight: bold; background-color: #e8f4f8; font-size: 18px; }
        .btn-main { background-color: var(--success); color: var(--white); border: none; padding: 12px 20px; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; }
        .btn-atu { background-color: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 4px; padding: 4px; font-size: 12px; width: 100%; color: #7f8c8d; cursor: pointer; }
        .btn-atu.active { background-color: var(--atu); color: #000; }
        .badge-atu { display: inline-block; background-color: var(--atu); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-top: 4px; }
        .round-col { width: 40px; font-weight: bold; background-color: var(--bg); }
        
        /* Modal (Meniu Joc Nou) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--white); padding: 25px; border-radius: 12px; text-align: center; width: 320px; }
        .modal-name-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 6px; text-align: center; font-size: 16px; }
        .modal-buttons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-modal { background-color: var(--primary); color: var(--white); border: none; padding: 12px 5px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="setupModal">
        <div class="modal-content">
            <h2 style="margin-top: 0;">Joc Nou (editează numele)</h2>
            <input type="text" id="modal-input-0" class="modal-name-input" placeholder="Eva" oninput="updateModalButtons()">
            <input type="text" id="modal-input-1" class="modal-name-input" placeholder="Vlad" oninput="updateModalButtons()">
            <input type="text" id="modal-input-2" class="modal-name-input" placeholder="Lori" oninput="updateModalButtons()">
            <input type="text" id="modal-input-3" class="modal-name-input" placeholder="Cris" oninput="updateModalButtons()">
            <p>Cine dă cărțile primul?</p>
            <div class="modal-buttons-grid">
                <button class="btn-modal" id="modal-btn-0" onclick="setDealer(0)"></button>
                <button class="btn-modal" id="modal-btn-1" onclick="setDealer(1)"></button>
                <button class="btn-modal" id="modal-btn-2" onclick="setDealer(2)"></button>
                <button class="btn-modal" id="modal-btn-3" onclick="setDealer(3)"></button>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>Scor Rummy</h1>
        <table>
            <thead>
                <tr>
                    <th class="round-col">#</th>
                    <th><input type="text" class="player-name" id="nume0" placeholder="J1"><span class="dealer-badge" id="dealer0"></span></th>
                    <th><input type="text" class="player-name" id="nume1" placeholder="J2"><span class="dealer-badge" id="dealer1"></span></th>
                    <th><input type="text" class="player-name" id="nume2" placeholder="J3"><span class="dealer-badge" id="dealer2"></span></th>
                    <th><input type="text" class="player-name" id="nume3" placeholder="J4"><span class="dealer-badge" id="dealer3"></span></th>
                </tr>
                <tr class="total-row">
                    <td class="round-col">Total</td><td id="total0">0</td><td id="total1">0</td><td id="total2">0</td><td id="total3">0</td>
                </tr>
            </thead>
            <tbody id="history-body"></tbody>
            <tfoot>
                <tr>
                    <td class="round-col">Atu</td>
                    <td>
                        <button class="btn-atu" id="btn-atu-0" onclick="alegeAtu(0)">Atu</button>
                        <div class="input-group">
                            <button class="btn-minus" onclick="toggleMinus('input0')">±</button>
                            <input type="text" id="input0" class="score-input" placeholder="0" inputmode="numeric">
                        </div>
                    </td>
                    <td>
                        <button class="btn-atu" id="btn-atu-1" onclick="alegeAtu(1)">Atu</button>
                        <div class="input-group">
                            <button class="btn-minus" onclick="toggleMinus('input1')">±</button>
                            <input type="text" id="input1" class="score-input" placeholder="0" inputmode="numeric">
                        </div>
                    </td>
                    <td>
                        <button class="btn-atu" id="btn-atu-2" onclick="alegeAtu(2)">Atu</button>
                        <div class="input-group">
                            <button class="btn-minus" onclick="toggleMinus('input2')">±</button>
                            <input type="text" id="input2" class="score-input" placeholder="0" inputmode="numeric">
                        </div>
                    </td>
                    <td>
                        <button class="btn-atu" id="btn-atu-3" onclick="alegeAtu(3)">Atu</button>
                        <div class="input-group">
                            <button class="btn-minus" onclick="toggleMinus('input3')">±</button>
                            <input type="text" id="input3" class="score-input" placeholder="0" inputmode="numeric">
                        </div>
                    </td>
                </tr>
            </tfoot>
        </table>
        <button class="btn-main" onclick="adaugaRunda()">Adaugă Runda</button>
        <button class="btn-main" onclick="reseteazaJocul()" style="background-color: var(--danger); margin-top: 10px;">Reset</button>
    </div>

    <script>
        let istoricRunde = [], currentDealer = -1, currentAtu = -1;

        window.onload = function() { arataModalDealer(); };

        function arataModalDealer() {
            document.getElementById('setupModal').style.display = 'flex';
            updateModalButtons();
        }

        function updateModalButtons() {
            for (let i = 0; i < 4; i++) {
                let input = document.getElementById('modal-input-' + i);
                let val = input.value.trim();
                // Dacă e gol, preia textul din placeholder (ex: Eva), altfel pune Jucător
                let numeDefault = input.getAttribute('placeholder') || ('Jucător ' + (i+1));
                
                document.getElementById('modal-btn-' + i).innerText = val || numeDefault;
            }
        }

        function setDealer(idx) {
            for (let i = 0; i < 4; i++) {
                let input = document.getElementById('modal-input-' + i);
                let val = input.value.trim();
                let numeDefault = input.getAttribute('placeholder') || ('Jucător ' + (i+1));
                
                // Trimite numele în tabelul principal
                document.getElementById('nume' + i).value = val || numeDefault;
            }
            currentDealer = idx;
            document.getElementById('setupModal').style.display = 'none';
            actualizeazaInterfata();
        }

        function alegeAtu(idx) {
            currentAtu = (currentAtu === idx) ? -1 : idx;
            for(let i = 0; i < 4; i++) document.getElementById('btn-atu-' + i).classList.toggle('active', i === currentAtu);
        }

        function toggleMinus(inputId) {
            let input = document.getElementById(inputId);
            let val = input.value;
            if (val.startsWith('-')) {
                input.value = val.substring(1);
            } else if (val !== '') {
                input.value = '-' + val;
            } else {
                input.value = '-';
            }
        }

        function adaugaRunda() {
            let s = [0,1,2,3].map(i => parseInt(document.getElementById('input' + i).value) || 0);
            if (s.every(val => val === 0)) return;
            istoricRunde.push({ scoruri: s, atu: currentAtu, dealer: currentDealer });
            currentDealer = (currentDealer + 1) % 4;
            [0,1,2,3].forEach(i => document.getElementById('input' + i).value = '');
            alegeAtu(-1);
            actualizeazaInterfata();
            
            // Scroll automat la finalul tabelului
            window.scrollTo(0, document.body.scrollHeight);
        }

        function editeazaScor(rIdx, pIdx, el) {
            istoricRunde[rIdx].scoruri[pIdx] = parseInt(el.value) || 0;
            recalculeazaTotaluri();
        }

        function recalculeazaTotaluri() {
            let t = [0,0,0,0];
            istoricRunde.forEach(r => r.scoruri.forEach((s, i) => t[i] += s));
            [0,1,2,3].forEach(i => document.getElementById('total' + i).innerText = t[i]);
        }

        function actualizeazaInterfata() {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            istoricRunde.forEach((r, idx) => {
                let tr = document.createElement('tr');
                tr.innerHTML = `<td class="round-col">${idx+1}</td>` + r.scoruri.map((s, pi) => `
                    <td>
                        <input type="text" inputmode="numeric" class="edit-input" value="${s}" oninput="editeazaScor(${idx}, ${pi}, this)">
                        ${r.atu === pi ? '<div class="badge-atu">Atu</div>' : ''}
                    </td>`).join('');
                tbody.appendChild(tr);
            });
            recalculeazaTotaluri();
            [0,1,2,3].forEach(i => document.getElementById('dealer' + i).innerText = (i === currentDealer ? "🃏 Dealer" : ""));
        }

        function reseteazaJocul() {
            if(confirm("Joc nou?")) { istoricRunde = []; arataModalDealer(); actualizeazaInterfata(); }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }
    </script>
</body>
</html>
